<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bambu Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00cfff;
    --green-dim: #0099cc;
    --amber: #ff5fc4;
    --red: #ff3b3b;
    --bg: rgba(6, 8, 20, 0.92);
    --border: rgba(0, 180, 255, 0.25);
    --text: #c8d0e8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 420px;
    height: 270px;
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .overlay {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-bottom: 3px solid var(--amber);
    padding: 14px 16px 12px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(8px);
    height: 270px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 0 20px rgba(0, 180, 255, 0.15), inset 0 0 30px rgba(0,0,0,0.3);
  }

  .overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .overlay::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--green) 0%, transparent 60%);
    opacity: 0.15;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .printer-name {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
  .status-dot.idle { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

  .filename {
    font-size: 11px;
    color: rgba(200,216,200,0.5);
    font-family: var(--mono);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }

  .progress-section {
    margin-bottom: 10px;
  }

  .progress-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .progress-pct {
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
  }

  .progress-pct span {
    font-size: 22px;
    font-weight: 300;
    color: var(--green);
    letter-spacing: 0;
  }

  .time-block { text-align: right; }

  .time-remaining {
    font-size: 22px;
    font-weight: 600;
    color: var(--green);
    font-family: var(--mono);
    line-height: 1;
  }

  .time-label {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
  }

  .bar-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 2px;
    transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px var(--green);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    animation: shimmer 2s infinite;
  }

  .layer-info {
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    font-family: var(--mono);
    text-align: right;
  }

  .temps {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .temp-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 7px 9px;
    border-radius: 2px;
    position: relative;
  }

  .temp-label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 3px;
  }

  .temp-value {
    font-size: 20px;
    font-weight: 600;
    font-family: var(--mono);
    color: #fff;
    line-height: 1;
  }

  .temp-value.hot { color: var(--amber); }
  .temp-value.nozzle { color: var(--green); }

  .temp-target {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .temp-icon {
    position: absolute;
    top: 7px; right: 8px;
    font-size: 14px;
    opacity: 0.3;
  }

  .ams-row {
    display: flex;
    gap: 5px;
    margin-top: 6px;
  }

  .ams-slot {
    flex: 1;
    border-radius: 2px;
    padding: 4px 6px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    text-align: center;
    transition: all 0.3s ease;
  }

  .ams-slot.active {
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 8px var(--slot-color, #fff);
  }

  .ams-swatch {
    width: 100%;
    height: 8px;
    border-radius: 1px;
    margin-bottom: 3px;
  }

  .ams-type {
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,216,200,0.4);
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .ams-slot.active .ams-type {
    color: rgba(255,255,255,0.8);
  }
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(200,216,200,0.3);
    text-transform: uppercase;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes shimmer {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="overlay">

  <div class="header">
    <div class="printer-name">
      <div class="status-dot" id="dot"></div>
      BAMBU LABS P2S &amp; AMS2 PRO
    </div>
    <div class="filename" id="filename">—</div>
  </div>

  <div class="idle-state hidden" id="idleState">● STANDBY</div>

  <div id="printSection">
    <div class="progress-section">
      <div class="progress-row">
        <div class="progress-pct" id="pct">0<span>%</span></div>
        <div class="time-block">
          <div class="time-remaining" id="timeRemaining">—</div>
          <div class="time-label">remaining</div>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar" style="width:0%"></div>
      </div>
      <div class="layer-info" id="layerInfo"></div>
    </div>

    <div class="temps">
      <div class="temp-card">
        <div class="temp-label">Nozzle</div>
        <div class="temp-value nozzle" id="nozzleTemp">—</div>
        <div class="temp-target" id="nozzleTarget"></div>
        <div class="temp-icon">🔥</div>
      </div>
      <div class="temp-card">
        <div class="temp-label">Bed</div>
        <div class="temp-value hot" id="bedTemp">—</div>
        <div class="temp-target" id="bedTarget"></div>
        <div class="temp-icon">⬛</div>
      </div>
    </div>

    <div class="ams-row" id="amsRow"></div>
  </div>

</div>

<script>
const API = 'http://localhost:5000/api/status';
const POLL_MS = 2500;
const el = id => document.getElementById(id);

function isIdle(data) {
  const s = (data.status || '').toLowerCase();
  return !data.connected || s === 'idle' || s === 'finish';
}

function update(data) {
  const printing = data.connected && !isIdle(data);

  el('dot').className = 'status-dot' + (!data.connected ? ' offline' : (isIdle(data) ? ' idle' : ''));

  const fname = data.filename || '';
  el('filename').textContent = fname ? fname.replace(/\.3mf$|\.gcode$/, '') : '—';

  if (!printing) {
    el('idleState').classList.remove('hidden');
    el('printSection').classList.add('hidden');
    return;
  }
  el('idleState').classList.add('hidden');
  el('printSection').classList.remove('hidden');

  const pct = Math.min(100, Math.max(0, data.progress || 0));
  el('pct').innerHTML = `${pct}<span>%</span>`;
  el('bar').style.width = pct + '%';

  el('timeRemaining').textContent = data.time_remaining_fmt || '—';

  if (data.layer_current && data.layer_total) {
    el('layerInfo').textContent = `LAYER ${data.layer_current} / ${data.layer_total}`;
  } else {
    el('layerInfo').textContent = '';
  }

  // AMS slots
  const amsRow = el('amsRow');
  if (data.ams && data.ams.length > 0) {
    amsRow.innerHTML = data.ams.map(slot => `
      <div class="ams-slot ${slot.active ? 'active' : ''}" style="--slot-color: ${slot.color}">
        <div class="ams-swatch" style="background: ${slot.color}"></div>
        <div class="ams-type">${slot.type || '—'}</div>
      </div>
    `).join('');
    amsRow.style.display = 'flex';
  } else {
    amsRow.style.display = 'none';
  }
  const n = data.nozzle_temp || 0;
  const b = data.bed_temp || 0;
  el('nozzleTemp').textContent = n > 0 ? n + '°' : '—';
  el('bedTemp').textContent    = b > 0 ? b + '°' : '—';
  el('nozzleTarget').textContent = data.nozzle_target > 0 ? `→ ${data.nozzle_target}°` : '';
  el('bedTarget').textContent    = data.bed_target > 0    ? `→ ${data.bed_target}°`    : '';
}

async function poll() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    update(data);
  } catch (e) {
    el('dot').className = 'status-dot offline';
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
